    <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You ❤️</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0f0f12;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 450px;
      height: 90vh;
      max-height: 800px;
      background: #18181c;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Navigation Tap Zones */
    .nav-zone {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 30%;
      z-index: 10;
      cursor: pointer;
    }
    .nav-left { left: 0; }
    .nav-right { right: 0; }

    /* Page Setup */
    .page {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start; /* Keeps content tied to the top */
      height: 100%;
      width: 100%;
      padding: 15px; /* Slightly reduced padding to maximize space */
      animation: fadeIn 0.4s ease-in-out;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* BACKGROUND IMAGE FOR ALL PAGES EXCEPT COVER */
    .page:not(:first-child) {
      background-image: url(Page.jpg);
    }

    .page.active {
      display: flex;
    }

    /* COVER PAGE STYLING: Zero padding & full height */
    .page.cover-page {
      padding: 0;
    }

    .cover-poster {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 20px;
      display: block;
    }

    /* Regular Card Components */
    .poster {
      width: 100%;
      height: 48%; /* fixed percentage height prevents top offset */
      object-fit: cover;
      border-radius: 12px;
      display: block;
    }

    .audio-player {
      width: 100%;
      margin-top: 12px;
      margin-bottom: 12px;
    }

    audio {
      width: 100%;
      border-radius: 30px;
      height: 40px;
    }

    /* Lyrics Crimson Box */
    .lyrics {
      text-align: center;
      font-size: 1rem;
      line-height: 1.5;
      color: #ffffff;
      font-style: italic;
      padding: 16px 20px;
      margin-top: auto; /* Pushes the lyrics box towards the bottom naturally */
      white-space: pre-line;
      background-color: #dc143c; /* Crimson Red */
      border-radius: 12px;
      width: 100%;
      box-shadow: 0 4px 15px rgba(220, 20, 60, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .page-indicator {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 0.8rem;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      z-index: 5;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Clickable Navigation Overlay -->
    <div class="nav-zone nav-left" onclick="changePage(-1)"></div>
    <div class="nav-zone nav-right" onclick="changePage(1)"></div>

    <div class="page-indicator" id="indicator">Cover</div>

    <!-- COVER PAGE (Page 0) -->
    <div class="page cover-page active">
      <img src="Covere.jpg" alt="Cover Poster" class="cover-poster">
    </div>

    <!-- CARD 1 -->
    <div class="page">
      <img src="Track1p1.jpg" class="poster" alt="Card 1">
      <div class="audio-player">
        <audio controls src="track1.m4a"></audio>
      </div>
      <div class="lyrics">"Sözlerin, gözlerin
Ellerin yalnız benim için
Düşlerim, gülüşlerim
Hayallerim yalnız senin için"</div>
    </div>

    <!-- CARD 2 -->
    <div class="page">
      <img src="Track2jp.jpeg" class="poster" alt="Card 2">
      <div class="audio-player">
        <audio controls src="track2.m4a"></audio>
      </div>
      <div class="lyrics">" You are always gonna be my love
いつか誰かとまた恋に落ちても
I'll remember to love
You taught me how"</div>
    </div>

    <!-- DUPLICATE THE CARD BLOCK ABOVE FOR CARDS 3 TO 12 -->

  </div>

  <script>
    let currentPage = 0;
    const pages = document.querySelectorAll('.page');
    const indicator = document.getElementById('indicator');

    function updatePage() {
      pages.forEach((page, index) => {
        if (index === currentPage) {
          page.classList.add('active');
          const audio = page.querySelector('audio');
          if (audio) {
            audio.currentTime = 0;
            audio.play().catch(() => {});
          }
        } else {
          page.classList.remove('active');
          const audio = page.querySelector('audio');
          if (audio) {
            audio.pause();
          }
        }
      });

      if (currentPage === 0) {
        indicator.textContent = "Cover";
      } else {
        indicator.textContent = `${currentPage} / ${pages.length - 1}`;
      }
    }

    function changePage(direction) {
      const newPage = currentPage + direction;
      if (newPage >= 0 && newPage < pages.length) {
        currentPage = newPage;
        updatePage();
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === "ArrowRight") changePage(1);
      if (e.key === "ArrowLeft") changePage(-1);
    });
  </script>
</body>
</html>
