      <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You ❤️</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0f0f12;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      overflow: hidden;
    }

    /* Outer Container fills mobile screen */
    .container {
      position: relative;
      width: 100%;
      max-width: 450px;
      height: 100vh;
      height: 100dvh;
      background: #18181c;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Navigation Tap Zones */
    .nav-zone {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 30%;
      z-index: 10;
      cursor: pointer;
    }
    .nav-left { left: 0; }
    .nav-right { right: 0; }

    /* Base Page Setup */
    .page {
      display: none;
      height: 100%;
      width: 100%;
      animation: fadeIn 0.4s ease-in-out;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* BACKGROUND IMAGE FOR ALL PAGES EXCEPT COVER */
    .page:not(:first-child) {
      background-image: url('Page.jpg');
      padding: 20px;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .page.active {
      display: flex;
    }

    /* COVER PAGE STYLING: Full screen poster */
    .page.cover-page {
      padding: 0;
    }

    .cover-poster {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* INNER CONTENT BOX: Formatted into a perfect Square */
    .square-card-box {
      width: 100%;
      aspect-ratio: 1 / 1; /* Forces the box to be square */
      background: rgba(255, 255, 255, 0.15); /* Subtle blur container */
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 8px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    /* Track Image inside Square Box */
    .poster {
      width: 100%;
      height: 42%;
      object-fit: cover;
      border-radius: 12px;
      display: block;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    /* Song Details Box */
    .song-details {
      width: 100%;
      text-align: left;
      padding: 0 2px;
    }

    .song-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: #000000;
      margin-bottom: 2px;
      line-height: 1.1;
    }

    .artist-name {
      font-size: 0.85rem;
      font-weight: 500;
      color: rgba(0, 0, 0, 0.7);
    }

    /* Audio Player Wrapper */
    .audio-player {
      width: 100%;
    }

    audio {
      width: 100%;
      border-radius: 30px;
      height: 36px;
    }

    /* Lyrics Crimson Box */
    .lyrics {
      text-align: left;
      font-size: 0.8rem;
      line-height: 1.35;
      color: #ffffff;
      font-style: italic;
      padding: 8px 12px;
      white-space: pre-line;
      background-color: #dc143c; /* Crimson Red */
      border-radius: 10px;
      width: 100%;
      box-shadow: 0 4px 10px rgba(220, 20, 60, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Clickable Navigation Overlay -->
    <div class="nav-zone nav-left" onclick="changePage(-1)"></div>
    <div class="nav-zone nav-right" onclick="changePage(1)"></div>

    <!-- COVER PAGE (Page 0) - Full screen poster -->
    <div class="page cover-page active">
      <img src="Covere.jpg" alt="Cover Poster" class="cover-poster">
    </div>

    <!-- CARD 1 -->
    <div class="page">
      <!-- SQUARE BOX CONTAINER INSIDE THE PAGE -->
      <div class="square-card-box">
        <img src="Track1p1.jpg" class="poster" alt="Card 1">
        
        <div class="song-details">
          <div class="song-title">m.</div>
          <div class="artist-name">Anil emle</div>
        </div>

        <div class="audio-player">
          <audio controls src="track1.m4a"></audio>
        </div>
        
        <div class="lyrics">"Sözlerin, gözlerin
Ellerin yalnız benim için
Düşlerim, gülüşlerim
Hayallerim yalnız senin için"</div>
      </div>
    </div>

    <!-- CARD 2 -->
    <div class="page">
      <!-- SQUARE BOX CONTAINER INSIDE THE PAGE -->
      <div class="square-card-box">
        <img src="Track2jp.jpeg" class="poster" alt="Card 2">

        <div class="song-details">
          <div class="song-title">First Love</div>
          <div class="artist-name">Utada Hikaru</div>
        </div>

        <div class="audio-player">
          <audio controls src="track2.m4a"></audio>
        </div>

        <div class="lyrics">" You are always gonna be my love
いつか誰かとまた恋に落ちても
I'll remember to love
You taught me how"</div>
      </div>
    </div>

  </div>

  <script>
    let currentPage = 0;
    const pages = document.querySelectorAll('.page');

    function updatePage() {
      pages.forEach((page, index) => {
        if (index === currentPage) {
          page.classList.add('active');
          const audio = page.querySelector('audio');
          if (audio) {
            audio.currentTime = 0;
            audio.play().catch(() => {});
          }
        } else {
          page.classList.remove('active');
          const audio = page.querySelector('audio');
          if (audio) {
            audio.pause();
          }
        }
      });
    }

    function changePage(direction) {
      const newPage = currentPage + direction;
      if (newPage >= 0 && newPage < pages.length) {
        currentPage = newPage;
        updatePage();
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === "ArrowRight") changePage(1);
      if (e.key === "ArrowLeft") changePage(-1);
    });
  </script>
</body>
</html>
