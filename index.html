       <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You ❤️</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0f0f12;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      overflow: hidden;
    }

    /* Container fills full mobile viewport */
    .container {
      position: relative;
      width: 100%;
      max-width: 450px;
      height: 100vh;
      height: 100dvh;
      background: #18181c;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Navigation Tap Zones */
    .nav-zone {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 30%;
      z-index: 10;
      cursor: pointer;
    }
    .nav-left { left: 0; }
    .nav-right { right: 0; }

    /* Page Setup */
    .page {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      height: 100%;
      width: 100%;
      padding: 20px;
      animation: fadeIn 0.4s ease-in-out;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      overflow-y: auto;
    }

    /* BACKGROUND IMAGE FOR ALL PAGES EXCEPT COVER */
    .page:not(:first-child) {
      background-image: url('Page.jpg');
    }

    .page.active {
      display: flex;
    }

    /* COVER PAGE STYLING: Full bleed image */
    .page.cover-page {
      padding: 0;
    }

    .cover-poster {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* BIGGER SQUARE POSTER IMAGE */
    .poster {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 16px;
      display: block;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
    }

    /* SONG DETAILS */
    .song-details {
      width: 100%;
      text-align: left;
      padding: 0 2px;
      background: transparent;
    }

    .song-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #000000;
      margin-bottom: 2px;
      letter-spacing: 0.2px;
      line-height: 1.2;
    }

    .artist-name {
      font-size: 0.95rem;
      font-weight: 500;
      color: rgba(0, 0, 0, 0.7);
    }

    /* AUDIO PLAYER WRAPPER */
    .audio-player {
      width: 100%;
      margin: 0;
    }

    audio {
      width: 100%;
      border-radius: 30px;
      height: 40px;
      display: block;
    }

    /* SQUARE LYRICS CRIMSON BOX WITH BOLDER, LARGER TEXT */
    .lyrics {
      text-align: left;
      font-size: 1.1rem; /* Increased size for impact */
      font-weight: 700;  /* Bolded letters */
      letter-spacing: 0.3px;
      line-height: 1.5;
      color: #ffffff;
      font-style: italic;
      padding: 20px;
      white-space: pre-line;
      background-color: #dc143c; /* Crimson Red */
      border-radius: 16px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3); /* Adds subtle depth */
      
      /* Square Box Specs */
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow-y: auto;

      box-shadow: 0 6px 18px rgba(220, 20, 60, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.25);
      
      display: flex;
      align-items: center;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Clickable Navigation Overlay -->
    <div class="nav-zone nav-left" onclick="changePage(-1)"></div>
    <div class="nav-zone nav-right" onclick="changePage(1)"></div>

    <!-- COVER PAGE (Page 0) -->
    <div class="page cover-page active">
      <img src="Covere.jpg" alt="Cover Poster" class="cover-poster">
    </div>

    <!-- CARD 1 -->
    <div class="page">
      <!-- Square Poster Component -->
      <img src="Track1p1.jpg" class="poster" alt="Card 1">
      
      <!-- SONG DETAILS BOX -->
      <div class="song-details">
        <div class="song-title">m.</div>
        <div class="artist-name">Anil emle</div>
      </div>

      <div class="audio-player">
        <audio controls src="track1.m4a"></audio>
      </div>
      
      <!-- Bolder & Bigger Square Crimson Lyrics Box -->
      <div class="lyrics">"Sözlerin, gözlerin
Ellerin yalnız benim için
Düşlerim, gülüşlerim
Hayallerim yalnız senin için"</div>
    </div>

    <!-- CARD 2 -->
    <div class="page">
      <!-- Square Poster Component -->
      <img src="Track2jp.jpeg" class="poster" alt="Card 2">

      <!-- SONG DETAILS BOX -->
      <div class="song-details">
        <div class="song-title">First Love</div>
        <div class="artist-name">Utada Hikaru</div>
      </div>

      <div class="audio-player">
        <audio controls src="track2.m4a"></audio>
      </div>

      <!-- Bolder & Bigger Square Crimson Lyrics Box -->
      <div class="lyrics">" You are always gonna be my love
いつか誰かとまた恋に落ちても
I'll remember to love
You taught me how"</div>
    </div>

  </div>

  <script>
    let currentPage = 0;
    const pages = document.querySelectorAll('.page');

    function updatePage() {
      pages.forEach((page, index) => {
        if (index === currentPage) {
          page.classList.add('active');
          const audio = page.querySelector('audio');
          if (audio) {
            audio.currentTime = 0;
            audio.play().catch(() => {});
          }
        } else {
          page.classList.remove('active');
          const audio = page.querySelector('audio');
          if (audio) {
            audio.pause();
          }
        }
      });
    }

    function changePage(direction) {
      const newPage = currentPage + direction;
      if (newPage >= 0 && newPage < pages.length) {
        currentPage = newPage;
        updatePage();
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === "ArrowRight") changePage(1);
      if (e.key === "ArrowLeft") changePage(-1);
    });
  </script>
</body>
</html>
